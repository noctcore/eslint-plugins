name: release

# Changesets two-phase release:
#   - PRs land with a changeset (`bun run changeset`) describing which packages bump.
#   - On push to main, if changesets are pending, the Changesets bot opens/updates a
#     "Version Packages" PR (bumps versions + writes CHANGELOGs).
#   - Merging that PR (no pending changesets) publishes the changed packages to npm.
# On the very first run there are no changesets, so it publishes the initial 0.1.0
# versions directly. Publishing goes through `npm publish` (via `changeset publish`)
# with OIDC provenance — `id-token: write` + each package's publishConfig.provenance.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: version or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test
      - name: Create Version PR or publish to npm
        uses: changesets/action@v1
        with:
          version: bun run version-packages
          publish: bunx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
