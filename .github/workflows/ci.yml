name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: typecheck · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      # Build first: plugins resolve @noctcore/eslint-utils via its emitted
      # dist/*.d.ts, so typecheck needs the build to have run.
      - run: bun run build
      - run: bun run typecheck
      - run: bun run test
